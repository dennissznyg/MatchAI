name: Daily job digest

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC dagligt
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore job database
        uses: actions/cache@v4
        with:
          path: data/jobs.db
          key: jobs-db-${{ github.run_id }}
          restore-keys: jobs-db-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write profile from secret
        env:
          CV_TEXT: ${{ secrets.CV_TEXT }}
        run: |
          mkdir -p profile
          printf '%s' "$CV_TEXT" > profile/cv.md

      - name: Run job finder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
        run: python main.py
